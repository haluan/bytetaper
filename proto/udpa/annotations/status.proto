syntax = "proto3";

package udpa.annotations;

import "google/protobuf/descriptor.proto";

// Compatibility subset for vendored Envoy API proto options.
enum PackageVersionStatus {
  UNKNOWN = 0;
  FROZEN = 1;
  ACTIVE = 2;
  NEXT_MAJOR_VERSION_CANDIDATE = 3;
}

message StatusAnnotation {
  bool work_in_progress = 1;
  PackageVersionStatus package_version_status = 2;
}

extend google.protobuf.FileOptions {
  StatusAnnotation file_status = 72295728;
}
