services:
  bytetaper-build:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_GTEST_TESTS=OFF -DBYTETAPER_ENABLE_INTEGRATION_TESTS=OFF
        cmake --build build --target bytetaper-extproc
        ctest --test-dir build --output-on-failure
        ./build/bytetaper-extproc
  bytetaper-unit-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_GTEST_TESTS=ON -DBYTETAPER_ENABLE_INTEGRATION_TESTS=OFF
        cmake --build build
        ctest --test-dir build --output-on-failure
  bytetaper-smoke-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build build --target bytetaper-extproc --target extproc_server_smoke_test
        ./build/bytetaper-extproc
        ctest --test-dir build -R extproc_server_smoke_test --output-on-failure
  bytetaper-integration-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build build --target extproc_externalprocessor_service_integration_test
        ctest --test-dir build -R extproc_externalprocessor_service_integration_test --output-on-failure
