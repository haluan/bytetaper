services:
  bytetaper-build:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_GTEST_TESTS=OFF -DBYTETAPER_ENABLE_INTEGRATION_TESTS=OFF
        cmake --build build --target bytetaper-extproc
        ctest --test-dir build --output-on-failure
        ./build/bytetaper-extproc
  bytetaper-unit-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_GTEST_TESTS=ON -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON
        cmake --build build
        ctest --test-dir build --output-on-failure
  bytetaper-smoke-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build build --target bytetaper-extproc --target extproc_server_smoke_test
        ./build/bytetaper-extproc
        ctest --test-dir build -R extproc_server_smoke_test --output-on-failure
  bytetaper-integration-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 tests/integration/e2e/oversized_envoy_assert.py

  bytetaper-cache-hit-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - BYTETAPER_TEST_BASE_URL=http://envoy:10000
      - BYTETAPER_MOCK_COUNTER_URL=http://mock-api:8080/call-count
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 ./tests/integration/e2e/cache_hit_immediate_response_test.py

  bytetaper-extproc:
    depends_on:
      mock-api:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-l2-cache:/var/cache/bytetaper
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build build --target bytetaper-extproc-server
        exec ./build/bytetaper-extproc-server --listen-address 0.0.0.0:18080 --policy-file examples/policy/bytetaper-policy.yaml --l2-cache-path /var/cache/bytetaper/global
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'printf \"\" > /dev/tcp/127.0.0.1/18080'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  mock-api:
    image: python:3.12-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
    command: ["python3", "/workspace/examples/mock-api/server.py"]
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 3s

  envoy:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/envoy
        - --mode
        - validate
        - -c
        - /etc/envoy/envoy.yaml
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  bytetaper-cache-e2e-test:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - BYTETAPER_TEST_BASE_URL=http://envoy:10000
      - BYTETAPER_MOCK_COUNTER_URL=http://mock-api:8080/call-count
      - BYTETAPER_MOCK_RESET_URL=http://mock-api:8080/reset-count
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 tests/integration/e2e/cache_e2e_test.py

volumes:
  bt-l2-cache: {}
