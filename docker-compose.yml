        cmake --build build --target bytetaper-extproc-server
        exec ./build/bytetaper-extproc-server --listen-address 0.0.0.0:18080 --policy-file examples/policy/compression-benchmark-policy.yaml --l2-cache-path /tmp/bytetaper-cache-compression --metrics-address 0.0.0.0 --metrics-port 18081
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'printf \"\" > /dev/tcp/127.0.0.1/18080 && printf \"\" > /dev/tcp/127.0.0.1/18081'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  envoy-compression:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc-compression:
        condition: service_healthy
    volumes:
      - ./examples/envoy:/etc/envoy:ro
    command:
      - /usr/local/bin/envoy
      - -c
      - /etc/envoy/envoy-compression.yaml
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/envoy
        - --mode
        - validate
        - -c
        - /etc/envoy/envoy-compression.yaml
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

