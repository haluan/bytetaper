services:
  bytetaper-build:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja
        cmake --build build --target bytetaper-extproc
        ctest --test-dir build --output-on-failure
        ./build/bytetaper-extproc
