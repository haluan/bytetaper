services:
  bytetaper-dev:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
  bytetaper-unit-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_GTEST_TESTS=ON -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON
        cmake --build build
        ctest --test-dir build --output-on-failure
  bytetaper-smoke-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build build --target bytetaper-extproc --target extproc_server_smoke_test
        ./build/bytetaper-extproc
        ctest --test-dir build -R extproc_server_smoke_test --output-on-failure
  bytetaper-integration-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 tests/integration/e2e/oversized_envoy_assert.py

  bytetaper-cache-hit-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - BYTETAPER_TEST_BASE_URL=http://envoy:10000
      - BYTETAPER_MOCK_COUNTER_URL=http://mock-api:8080/call-count
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 ./tests/integration/e2e/cache_hit_immediate_response_test.py

  bytetaper-pagination-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        sh ./tests/integration/pagination_default_limit_test.sh

  bytetaper-max-limit-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        sh ./tests/integration/pagination_max_limit_test.sh

  bytetaper-extproc:
    image: bytetaper-dev:latest
    depends_on:
      mock-api:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        mkdir -p /tmp/bytetaper-cache
        cmake -S . -B build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build build --target bytetaper-extproc-server
        exec ./build/bytetaper-extproc-server --listen-address 0.0.0.0:18080 --policy-file examples/policy/bytetaper-policy.yaml --l2-cache-path /tmp/bytetaper-cache --metrics-address 0.0.0.0 --metrics-port 18081
    ports:
      - "18080:18080"
      - "18081:18081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'printf \"\" > /dev/tcp/127.0.0.1/18080 && printf \"\" > /dev/tcp/127.0.0.1/18081'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  mock-api:
    image: python:3.12-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
    command: ["python3", "/workspace/examples/mock-api/server.py"]
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 3s

  envoy:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
    volumes:
      - ./examples/envoy:/etc/envoy:ro
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/envoy
        - --mode
        - validate
        - -c
        - /etc/envoy/envoy.yaml
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  bytetaper-cache-e2e-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - BYTETAPER_TEST_BASE_URL=http://envoy:10000
      - BYTETAPER_MOCK_COUNTER_URL=http://mock-api:8080/call-count
      - BYTETAPER_MOCK_RESET_URL=http://mock-api:8080/reset-count
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
