# Envoy configuration example: ByteTaper compression coordination.
# ByteTaper (ExtProc) evaluates eligibility and emits diagnostic headers.
# Envoy's compressor filter performs actual gzip/brotli compression.

static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 10000
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: mock_api_cluster
          http_filters:
          # 1. ByteTaper ExtProc: evaluates eligibility, emits x-bytetaper-compression-candidate.
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              grpc_service:
                envoy_grpc:
                  cluster_name: extproc_cluster
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SEND
                response_body_mode: BUFFERED
          # 2. Envoy compressor: performs actual gzip compression.
          #    Operates independently of ByteTaper — uses standard Accept-Encoding.
          #    ByteTaper's x-bytetaper-compression-candidate is diagnostic only.
          - name: envoy.filters.http.compressor
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.compressor.v3.Compressor
              response_direction_config:
                common_config:
                  min_content_length: 1024
                  content_type:
                    - application/json
                    - text/plain
                    - text/html
                disable_on_etag_header: true
              compressor_library:
                name: envoy.compression.gzip.compressor
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.compression.gzip.compressor.v3.Gzip
                  compression_level: DEFAULT_COMPRESSION
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: mock_api_cluster
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: mock_api_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: mock-api
                port_value: 8080

  - name: extproc_cluster
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: extproc_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: bytetaper-extproc
                port_value: 50051
