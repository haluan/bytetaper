routes:
  - id: "api-v1-compression-benchmark"
    match:
      kind: prefix
      prefix: /api/v1/
    method: get
    mutation: full
    max_response_bytes: 2097152
    compression:
      enabled: true
      min_size_bytes: 1024
      eligible_content_types:
        - application/json
      preferred_algorithms:
        - gzip
