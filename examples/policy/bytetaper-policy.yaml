routes:
  - id: "api-v1-proxy"
    match:
      kind: "prefix"
      prefix: "/api/v1/"
    method: "get"
    mutation: "full"
    max_response_bytes: 2097152
    cache:
      behavior: "store"
      ttl_seconds: 300
    field_filter:
      mode: "allowlist"
      fields:
        - "id"
        - "name"
        - "status"

  - id: "admin-exact"
    match:
      kind: "exact"
      prefix: "/admin"
    mutation: "headers_only"

  - id: "api-v1-l1-cached"
    match:
      kind: prefix
      prefix: /api/v1/cached/
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 300
      layers:
        l1:
          enabled: true
          capacity_entries: 8

  - id: "api-v1-l1l2-cached"
    match:
      kind: prefix
      prefix: /api/v1/durable/
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 3600
      layers:
        l1:
          enabled: true
          capacity_entries: 8
        l2:
          enabled: true
          path: /var/cache/bytetaper/api-v1-durable

  - id: "api-v1-private-cached"
    match:
      kind: prefix
      prefix: /api/v1/private/
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 60
      private_cache: true
      layers:
        l1:
          enabled: true
          capacity_entries: 8
