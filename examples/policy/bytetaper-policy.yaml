routes:
  - id: "api-v1-proxy"
    match:
      kind: "prefix"
      prefix: "/api/v1/"
    method: "get"
    mutation: "disabled"
    max_response_bytes: 1048576
    field_filter:
      mode: "allowlist"
      fields:
        - "id"
        - "name"
        - "status"

  - id: "admin-exact"
    match:
      kind: "exact"
      prefix: "/admin"
    mutation: "headers_only"
