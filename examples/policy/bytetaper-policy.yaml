routes:
  - id: "api-v1-proxy"
    match:
      kind: prefix
      prefix: /api/v1/
    method: get
    mutation: full
    max_response_bytes: 2097152
    compression:
      enabled: true
      min_size_bytes: 1024
      eligible_content_types:
        - application/json
      preferred_algorithms:
        - gzip
    cache:
      behavior: store
      ttl_seconds: 300
    field_filter:
      mode: allowlist
      fields:
        - id
        - name
        - status
        - service
        - scenario
        - version
        - payload

  - id: "admin-exact"
    match:
      kind: exact
      prefix: /admin
    mutation: headers_only

  - id: "api-v1-l1-cached"
    match:
      kind: prefix
      prefix: /api/v1/cached/
    mutation: full
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 300
      layers:
        l1:
          enabled: true
          capacity_entries: 8
    coalescing:
      enabled: true
      wait_window_ms: 50
      max_waiters_per_key: 128

  - id: "api-v1-l1l2-cached"
    match:
      kind: prefix
      prefix: /api/v1/durable/
    mutation: full
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 3600
      layers:
        l1:
          enabled: true
          capacity_entries: 8
        l2:
          enabled: true
          path: /var/cache/bytetaper/api-v1-durable

  - id: "api-v1-private-cached"
    match:
      kind: prefix
      prefix: /api/v1/private/
    mutation: full
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 60
      private_cache: true
      layers:
        l1:
          enabled: true
          capacity_entries: 8

  - id: "api-v1-e2e-cache"
    match:
      kind: prefix
      prefix: /api/v1/e2e/
    method: get
    mutation: full
    max_response_bytes: 65536
    cache:
      behavior: store
      enabled: true
      ttl_seconds: 3600
      layers:
        l1:
          enabled: true
          capacity_entries: 1   # intentionally 1 so second key evicts first
        l2:
          enabled: true
          path: /var/cache/bytetaper/e2e
    field_filter:
      mode: allowlist
      fields:
        - service
        - version

  - id: "api-v1-paginated"
    match:
      kind: prefix
      prefix: /api/v1/list/
    method: get
    mutation: full
    max_response_bytes: 65536
    pagination:
      enabled: true
      mode: limit_offset
      limit_param: limit
      offset_param: offset
      default_limit: 20
      max_limit: 100
      upstream_supports_pagination: true
      max_response_bytes_warning: 524288
  - id: "orders-paginated"
    match:
      kind: prefix
      prefix: /orders
    mutation: full
    pagination:
      enabled: true
      mode: limit_offset
      default_limit: 50
      max_limit: 500
      limit_param: limit
      offset_param: offset
      upstream_supports_pagination: true


